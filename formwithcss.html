<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    <style>

        .box{
            border: 3px solid #000;
            width:500px;
        min-height:   200px;
        margin:-113px auto;

        
    }
    body{
         background: linear-gradient(90deg, #494B4B 0%, #5361AF 100%);
         background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
    }
    .logo{
    
        margin-left: 92px;
        padding:10px; 
        box-sizing: border-box;
        
    }

    .p{
      color:#000;
      font-size: 60px;
      text-align: center;
      margin-top: -40px;
      margin-left: auto;
      line-height: 4;

    }
    .sub-container{
        padding: 15px;
        box-sizing: border-box;
        width:850px;
       min-height: 200px;

    }
    input[type="text"], input[type="password"]
    {
        width:450px;
        height:40px;
        border: 2px solid #222121;
        border-radius: 5px 5px 5px 5px;
        margin-top: 20px;
        text-align: center;
        background-color: #211f1f;
        color: #fff;

    }
    input[type="button"]
    {
width:450px;
        height:40px;
        border: 2px solid #222121;
        border-radius: 5px 5px 5px 5px;
        margin-top: 70px;
        text-align: center;
        background-color: #051c51;
        color: #fff;
    }
    .p1{
        text-align:left;
         margin-left:  92px;

    }
    
    
    </style>
</head>
<body>
    <p class="p">FLAT SIGNUP FORM </p>
    <div class="box">
        <div class="sub-container">
            <div class="r1"><input type="text"
                placeholder="real name"/>
            
        </div><div class="r2"><input type="text"
                placeholder="username"/>
            
            
        </div><div class="r3"><input type="password"
                placeholder="password"/>
            
            <div class="r4"><input type="password"
                placeholder=" confirm password"/>
                <p class="p1"> By clicking sign up. I agree to your terms.</p>
                
            
                
            <div class="r5"><input type="button"
                value="sign up"/>
                </div>
            
                
            
        </div>
            
        </div>
        <div class="logo"> follow us on:
            <i class="fa-brands fa-facebook"></i><i class="fa-brands fa-twitter"></i><i class="fa-brands fa-instagram"></i>
        </div>
        </div>

    </div>
</body>
</html>
